<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>质量月活动策划报告 · 样式母板</title>
<style>
 *{box-sizing:border-box;font-family:-apple-system,"Microsoft YaHei",sans-serif;color:#2c3e50;}
 body{margin:0;background:#f4f6f8;padding:32px;}
 .wrap{max-width:980px;margin:0 auto;background:#fff;border-radius:12px;padding:36px;box-shadow:0 4px 20px rgba(0,0,0,.08);}
 h1{color:#1a252f;margin-top:0;border-bottom:3px solid #C8102E;padding-bottom:10px;}
 h2{color:#C8102E;margin-top:28px;}
 h3{color:#1a252f;}
 .meta{color:#7f8c8d;font-size:14px;margin:4px 0;}
 .warn{color:#e67e22;}
 .sec{margin-top:20px;}
 table{width:100%;border-collapse:collapse;margin-top:10px;}
 th,td{border:1px solid #ecf0f1;padding:8px 10px;font-size:13px;text-align:left;vertical-align:top;}
 th{background:#f8f9fa;}
 tr.ph{background:#fdf2f2;font-weight:bold;}
 ul{line-height:1.9;}
 .card{background:#f8f9fa;border-left:4px solid #C8102E;padding:10px 14px;border-radius:6px;margin:8px 0;}
 /* 阶段时间轴配色 */
 .ph0{fill:#2980B9;} .ph1{fill:#27AE60;} .ph2{fill:#E67E22;} .ph3{fill:#8E44AD;} .ph4{fill:#16A085;}
</style>
</head>
<body>
<div class="wrap">
  <h1>质量月活动策划报告</h1>
  <div class="meta">组织：____　|　届次：____</div>
  <div class="meta">主题：____　|　周期：____　|　范围：____　|　预算：____</div>

  <div class="sec"><h2>一、活动总体方案</h2>
    <p><b>背景</b></p><p>____</p>
    <p><b>目标</b></p><ul><li>____</li></ul>
    <p><b>组织机制</b></p><p>____</p>
  </div>

  <div class="sec"><h2>二、活动排期与清单</h2>
    <!-- 此处插入 timeline_svg + schedule 表 -->
    <table><tr><th>事项</th><th>责任方</th><th>产出</th></tr>
      <tr class="ph"><td colspan="3">【启动阶段】____</td></tr>
      <tr><td>____</td><td>____</td><td>____</td></tr>
    </table>
  </div>

  <div class="sec"><h2>三、宣传文案包</h2>
    <p><b>主题口号</b></p><ul><li>____</li></ul>
    <div class="card"><b>启动会致辞</b><br>____</div>
    <div class="card"><b>海报文案</b><br>____</div>
    <div class="card"><b>公众号推文</b><br>____</div>
  </div>

  <div class="sec"><h2>四、总结与评优</h2>
    <p>____</p>
    <table><tr><th>指标</th><th>目标</th><th>实际</th></tr>
      <tr><td>____</td><td>____</td><td>____</td></tr>
    </table>
  </div>

  <div class="sec"><h2>五、供参考·待确认项</h2>
    <ul><li>____</li></ul>
  </div>
</div>
</body>
</html>
